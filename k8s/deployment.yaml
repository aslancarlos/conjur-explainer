apiVersion: apps/v1
kind: Deployment
metadata:
  name: conjur-explainer
  namespace: conjur
  labels:
    app: conjur-explainer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: conjur-explainer
  template:
    metadata:
      labels:
        app: conjur-explainer
    spec:
      containers:
        - name: conjur-explainer
          image: aslancarlos/conjur-explainer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
