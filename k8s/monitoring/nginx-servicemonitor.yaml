---
# ServiceMonitor tells Prometheus to scrape nginx-internal-metrics every 30s.
# The kube-prometheus-stack operator watches all namespaces for ServiceMonitors
# whose release label matches the Prometheus instance (release: prometheus).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: nginx-internal-ingress
  namespace: monitoring
  labels:
    release: prometheus
spec:
  namespaceSelector:
    matchNames:
      - ingress-nginx
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
      app.kubernetes.io/instance: nginx-internal
      app.kubernetes.io/component: controller
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scheme: http
